<section class="flex flex-col gap-5 px-0 lg:px-20">
  <div class="flex items-center justify-between">
    <h2 class="text-4xl {{ fontFamilySelected() }}">
      {{ articleSelected()?.category | articleSection }}
    </h2>

    <button
      class="btn btn-outline btn-neutral"
      (click)="navigateToReleasePage(articleSelected()?.release)"
    >
      Volver
    </button>
  </div>

  <div class="rounded-lg border border-gray-200 bg-white p-4 shadow-lg">
    <div class="grid grid-cols-1 gap-10 lg:grid-cols-3">
      <div class="col-span-2 flex flex-col gap-3">
        <h3 class="text-info text-3xl font-semibold">{{ articleSelected()?.title }}</h3>
        <h4 class="text-gray-500">{{ articleSelected()?.author }}</h4>

        <div class="content-article">
          <div [innerHTML]="articleSelected()?.content | safeHtml"></div>
        </div>
      </div>

      <div>
        <img [src]="articleSelected()?.image" class="rounded-lg" width="100%" alt="foto" />
      </div>
    </div>
  </div>
</section>
