<section class="px-20">
  <div class="mb-5 flex items-center justify-between">
    <h2 class="text-3xl" [class.fontFamily]="'fredoka-regular'">
      {{ articleSelected()?.category | articleSection }}
    </h2>

    <a (click)="navigateToReleasePage(articleSelected()?.release)">Volver</a>
  </div>
  <div class="rounded-lg border border-gray-200 bg-white p-4">
    <div class="grid grid-cols-1 gap-10 lg:grid-cols-2">
      <div>
        <h3 class="text-xl">{{ articleSelected()?.title }}</h3>
        <h4>{{ articleSelected()?.author }}</h4>

        <div class="content-article">
          <div [innerHTML]="articleSelected()?.content | safeHtml"></div>
        </div>
      </div>

      <div>
        <img [src]="articleSelected().image" width="100%" alt="foto" />
      </div>
    </div>
  </div>
</section>
