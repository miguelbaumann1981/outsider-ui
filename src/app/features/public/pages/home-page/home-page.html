<main class="flex flex-col gap-5">
  <!-- SLOGAN -->
  @if (releaseLocalStorage() === 'current') {
    <div class="flex items-center justify-center">
      <h1 id="slogan" class="slogan" [class.fontFamily]="fontFamilyStyle()">
        Revista Literaria Subterránea
      </h1>
    </div>
  } @else {
    <div class="flex items-center justify-center">
      <h2 class="slogan">{{ releaseLocalStorage() | release }}</h2>
    </div>
  }

  <!-- CARDS -->
  <div class="grid grid-cols-1 gap-5 lg:grid-cols-2 lg:gap-10">
    @for (article of articlesRelease(); track article.id) {
      <out-article-home-card
        [article]="article"
        (click)="navigateToDetail(article.release, article.slug)"
      />
    } @empty {
      <p>No hay informacion</p>
    }
  </div>
</main>
